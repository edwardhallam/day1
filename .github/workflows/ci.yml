name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  api-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -c "from app.main import app; print('Import check passed')"
